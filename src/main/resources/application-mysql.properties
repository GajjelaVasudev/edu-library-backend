spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/edu_library_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:root}
# Change this placeholder to your real MySQL password (or set MYSQL_PASSWORD env var).
spring.datasource.password=${MYSQL_PASSWORD:YOUR_MYSQL_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=mysql
